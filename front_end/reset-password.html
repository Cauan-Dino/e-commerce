<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Senha - Minha Loja</title>
    <style>
        /* Use o estilo azul do seu e-commerce aqui */
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Redefinir Senha</h3>
        <input type="password" id="senha" placeholder="Nova senha">
        <input type="password" id="confirmar" placeholder="Confirme a senha">
        <button onclick="resetar()">Salvar Nova Senha</button>
        <p id="feedback"></p>
    </div>

    <script>
        async function resetar() {
            const senha = document.getElementById('senha').value;
            const confirmar = document.getElementById('confirmar').value;
            const feedback = document.getElementById('feedback');

            if (senha !== confirmar) {
                feedback.innerText = "As senhas não coincidem!";
                return;
            }

            // Captura o token da URL (?token=XYZ)
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            const response = await fetch('/site/confirmar-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, nova_senha: senha })
            });

            const result = await response.json();
            feedback.innerText = result.message || result.detail;
            
            if (response.ok) {
                setTimeout(() => window.location.href = "/", 3000); // Volta pra home após 3s
            }
        }
    </script>
</body>
</html>
